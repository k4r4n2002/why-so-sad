<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Snowy's in the garden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blush-1:#FFF3F8; --blush-2:#FFE2EE; --lav:#F3E6FB;
    --rose:#FF93B3; --rose-deep:#FF6F9C;
    --plum:#8A5A6E; --plum-soft:#B589A0;
    --cream:#FFFFFF; --shadow:rgba(255,127,162,.28); --heart:#FF5E8A;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; margin:0; }
  body{
    font-family:"Quicksand",system-ui,sans-serif; color:var(--plum);
    background:radial-gradient(1200px 600px at 20% -10%, var(--lav), transparent 60%),
               linear-gradient(160deg, var(--blush-1), var(--blush-2));
    min-height:100dvh; display:flex; align-items:center; justify-content:center;
    padding:16px; overflow:hidden; position:relative;
  }
  .ambient{ position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .ambient span{ position:absolute; bottom:-30px; font-size:18px; opacity:.5; animation:float-up linear infinite; }
  @keyframes float-up{ 0%{ transform:translateY(0) rotate(0); opacity:0;} 12%{opacity:.5;} 100%{ transform:translateY(-115dvh) rotate(40deg); opacity:0;} }

  .card{
    position:relative; z-index:1; width:min(460px,100%);
    background:rgba(255,255,255,.55); border:1px solid rgba(255,255,255,.7);
    border-radius:30px; padding:24px 20px 20px; backdrop-filter:blur(8px);
    box-shadow:0 24px 60px -28px var(--shadow), inset 0 1px 0 rgba(255,255,255,.6); text-align:center;
  }
  .eyebrow{ font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:var(--plum-soft); font-weight:600; margin:0 0 4px; }

  .bubble{ position:relative; background:var(--cream); border-radius:22px; padding:14px 18px; margin:4px auto 0;
    max-width:360px; box-shadow:0 12px 28px -16px var(--shadow); min-height:66px; display:flex; align-items:center; justify-content:center; }
  .bubble p{ margin:0; font-family:"Caveat",cursive; font-size:27px; line-height:1.12; font-weight:700; color:var(--rose-deep);
    transition:opacity .25s ease, transform .25s ease; }
  .bubble:after{ content:""; position:absolute; left:50%; bottom:-12px; transform:translateX(-50%);
    border:12px solid transparent; border-top-color:var(--cream); border-bottom:0; filter:drop-shadow(0 6px 4px rgba(255,127,162,.12)); }

  /* GARDEN PANORAMA */
  .garden{ position:relative; width:100%; aspect-ratio:16/10; margin:18px auto 4px; border-radius:22px; overflow:hidden;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.6), 0 16px 34px -22px var(--shadow); }
  .backdrop{ position:absolute; inset:0; width:100%; height:100%; }

  .maa{ position:absolute; bottom:16%; left:76%; width:21%; transform:translateX(-50%); z-index:3; }

  .snowy{ position:absolute; bottom:11%; left:14%; width:24%; transform:translateX(-50%) scale(var(--s,.82));
    transform-origin:bottom center; transition:left .55s cubic-bezier(.45,0,.25,1), transform .55s ease; z-index:4; cursor:pointer; outline:none; }
  .snowy:focus-visible{ box-shadow:0 0 0 4px rgba(255,143,171,.55); border-radius:24px; }
  .snowy-inner{ transform-origin:bottom center; display:block; }
  .snowy.run .snowy-inner{ animation:gallop .52s ease; }
  @keyframes gallop{
    0%{ transform:translateY(0) scale(1,1) rotate(0); }
    22%{ transform:translateY(-15px) scale(.95,1.07) rotate(-3deg); }
    52%{ transform:translateY(0) scale(1.06,.93) rotate(2deg); }
    78%{ transform:translateY(-6px) scale(.99,1.02) rotate(-1deg); }
    100%{ transform:translateY(0) scale(1,1) rotate(0); }
  }
  .snowy .leg{ transform-box:fill-box; transform-origin:50% 8%; }
  .snowy.run .leg-a{ animation:legA .52s ease; }
  .snowy.run .leg-b{ animation:legB .52s ease; }
  @keyframes legA{ 0%,100%{transform:rotate(16deg);} 50%{transform:rotate(-20deg);} }
  @keyframes legB{ 0%,100%{transform:rotate(-18deg);} 50%{transform:rotate(18deg);} }

  .eye-lid{ transform-box:fill-box; transform-origin:center; animation:blink 5.5s infinite; }
  @keyframes blink{ 0%,94%,100%{ transform:scaleY(0);} 96%,98%{ transform:scaleY(1);} }
  .tail{ transform-box:fill-box; transform-origin:0% 80%; animation:sway 2.6s ease-in-out infinite; }
  @keyframes sway{ 0%,100%{ transform:rotate(0);} 50%{ transform:rotate(-12deg);} }

  /* butterfly */
  .fly{ position:absolute; width:8%; z-index:2; cursor:pointer; animation:flutter 7s ease-in-out infinite; outline:none; }
  .fly:focus-visible{ box-shadow:0 0 0 4px rgba(255,143,171,.55); border-radius:50%; }
  @keyframes flutter{ 0%{ transform:translate(0,0) rotate(-6deg);} 25%{ transform:translate(-18px,-14px) rotate(6deg);} 50%{ transform:translate(8px,-26px) rotate(-4deg);} 75%{ transform:translate(20px,-10px) rotate(8deg);} 100%{ transform:translate(0,0) rotate(-6deg);} }
  .fly .wing{ transform-box:fill-box; transform-origin:right center; animation:flap .3s ease-in-out infinite alternate; }
  .fly .wing.r{ transform-origin:left center; }
  @keyframes flap{ from{ transform:scaleX(1);} to{ transform:scaleX(.5);} }

  .pop{ position:absolute; pointer-events:none; font-size:18px; z-index:6; animation:pop .9s ease-out forwards; }
  @keyframes pop{ 0%{ transform:translate(0,0) scale(.4); opacity:0;} 20%{ opacity:1;} 100%{ transform:translate(var(--dx),-46px) scale(1.05); opacity:0;} }

  .meter{ margin:14px auto 2px; }
  .meter-label{ font-size:12.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--plum-soft); font-weight:600; margin-bottom:8px; }
  .pips{ display:flex; gap:9px; justify-content:center; }
  .pip{ width:20px; height:20px; transition:transform .3s cubic-bezier(.34,1.56,.64,1), filter .3s ease; filter:grayscale(1) opacity(.35); transform:scale(.85); }
  .pip.on{ filter:none; transform:scale(1.05); }

  .hint{ font-size:14px; color:var(--plum-soft); margin:14px 0 2px; font-weight:500; min-height:18px; }
  .credit{ font-family:"Caveat",cursive; font-size:18px; color:var(--plum-soft); margin-top:8px; }

  .cele{ position:fixed; inset:0; z-index:20; display:none; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:24px; background:radial-gradient(800px 600px at 50% 30%, rgba(255,255,255,.85), rgba(255,226,238,.92)); backdrop-filter:blur(2px); }
  .cele.show{ display:flex; animation:fade .6s ease; }
  @keyframes fade{ from{opacity:0;} to{opacity:1;} }
  .cele svg{ width:170px; height:auto; }
  .cele h1{ font-family:"Caveat",cursive; font-weight:700; color:var(--rose-deep); font-size:42px; line-height:1.1; margin:6px 0 2px; max-width:360px; }
  .cele p{ max-width:330px; font-size:16px; color:var(--plum); margin:6px 0 22px; }
  .btn{ border:0; cursor:pointer; font-family:"Quicksand",sans-serif; font-weight:700; font-size:15px; color:#fff; background:var(--rose);
    padding:13px 26px; border-radius:999px; box-shadow:0 14px 26px -12px var(--rose-deep); transition:transform .15s ease, background .2s ease; }
  .btn:hover{ background:var(--rose-deep); transform:translateY(-2px); }
  .btn:active{ transform:translateY(0); }
  .confetti{ position:fixed; inset:0; pointer-events:none; z-index:21; overflow:hidden; }
  .confetti span{ position:absolute; top:-24px; font-size:20px; animation:fall linear forwards; }
  @keyframes fall{ to{ transform:translateY(110dvh) rotate(360deg); opacity:.2; } }

  @media (max-width:380px){ .bubble p{ font-size:24px;} .cele h1{ font-size:36px;} }
  @media (prefers-reduced-motion: reduce){
    .ambient span,.tail,.fly,.fly .wing,.eye-lid,.snowy.run .snowy-inner,.snowy.run .leg-a,.snowy.run .leg-b,.confetti span{ animation:none !important; }
  }
</style>
</head>
<body>
  <div class="ambient" id="ambient" aria-hidden="true"></div>

  <main class="card" role="main">
    <p class="eyebrow">out in the garden</p>
    <div class="bubble"><p id="line">why are you sad, maa? 🥺</p></div>

    <div class="garden" id="garden">
      <!-- garden backdrop -->
      <svg class="backdrop" viewBox="0 0 160 100" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#FFE9F2"/><stop offset="1" stop-color="#FFF1E8"/>
          </linearGradient>
          <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#CDEBCF"/><stop offset="1" stop-color="#AFDFB4"/>
          </linearGradient>
          <radialGradient id="sun" cx="50%" cy="50%" r="50%">
            <stop offset="0" stop-color="#FFF4D6"/><stop offset="1" stop-color="#FFE3AE"/>
          </radialGradient>
        </defs>
        <rect width="160" height="66" fill="url(#sky)"/>
        <circle cx="30" cy="20" r="22" fill="#FFE9C0" opacity=".5"/>
        <circle cx="30" cy="20" r="12" fill="url(#sun)"/>
        <!-- clouds -->
        <g fill="#FFFFFF" opacity=".8">
          <ellipse cx="108" cy="16" rx="13" ry="6"/><ellipse cx="118" cy="14" rx="9" ry="5"/><ellipse cx="98" cy="18" rx="8" ry="4"/>
          <ellipse cx="64" cy="26" rx="9" ry="4"/><ellipse cx="72" cy="25" rx="6" ry="3"/>
        </g>
        <!-- hills -->
        <path d="M0 66 Q40 44 80 64 T160 60 V100 H0Z" fill="#C5E8CB"/>
        <path d="M0 70 Q50 56 100 70 T160 70 V100 H0Z" fill="url(#grass)"/>
        <!-- flowers + tufts -->
        <g>
          <g transform="translate(18,82)"><g fill="#FF9FC0"><circle cx="0" cy="-5" r="3"/><circle cx="5" cy="0" r="3"/><circle cx="-5" cy="0" r="3"/><circle cx="0" cy="5" r="3"/></g><circle r="2.4" fill="#FFE08A"/><rect x="-1" y="5" width="2" height="9" fill="#7FBF86"/></g>
          <g transform="translate(46,90)"><g fill="#E0BBE4"><circle cx="0" cy="-5" r="3"/><circle cx="5" cy="0" r="3"/><circle cx="-5" cy="0" r="3"/><circle cx="0" cy="5" r="3"/></g><circle r="2.4" fill="#FFE08A"/><rect x="-1" y="5" width="2" height="9" fill="#7FBF86"/></g>
          <g transform="translate(126,86)"><g fill="#FF9FC0"><circle cx="0" cy="-5" r="3"/><circle cx="5" cy="0" r="3"/><circle cx="-5" cy="0" r="3"/><circle cx="0" cy="5" r="3"/></g><circle r="2.4" fill="#FFE08A"/><rect x="-1" y="5" width="2" height="9" fill="#7FBF86"/></g>
          <g transform="translate(148,92)"><g fill="#E0BBE4"><circle cx="0" cy="-5" r="3"/><circle cx="5" cy="0" r="3"/><circle cx="-5" cy="0" r="3"/><circle cx="0" cy="5" r="3"/></g><circle r="2.4" fill="#FFE08A"/><rect x="-1" y="5" width="2" height="9" fill="#7FBF86"/></g>
          <g stroke="#8FCB92" stroke-width="1.6" stroke-linecap="round" fill="none">
            <path d="M70 96 v-7 M73 96 v-9 M76 96 v-6"/><path d="M30 98 v-6 M33 98 v-8"/><path d="M138 98 v-7 M141 98 v-9"/>
          </g>
        </g>
        <!-- little tree, left -->
        <g transform="translate(8,40)"><rect x="3" y="22" width="5" height="20" rx="2" fill="#C79A7A"/><circle cx="5" cy="16" r="14" fill="#BBE3BE"/><circle cx="5" cy="16" r="14" fill="#FFC9DC" opacity=".25"/></g>
      </svg>

      <!-- maa, standing, welcoming -->
      <svg class="maa" viewBox="0 0 120 200" xmlns="http://www.w3.org/2000/svg" aria-label="maa standing in the garden">
        <ellipse cx="60" cy="194" rx="34" ry="6" fill="rgba(138,90,110,.16)"/>
        <!-- dress -->
        <path d="M44 96 q16 -8 32 0 l14 96 q-30 12 -60 0 Z" fill="#FFC2D6" stroke="#FFB0C9" stroke-width="2"/>
        <!-- arms slightly open -->
        <path d="M46 104 q-16 14 -16 40" stroke="#F4C9A8" stroke-width="9" fill="none" stroke-linecap="round"/>
        <path d="M74 104 q16 14 16 40" stroke="#F4C9A8" stroke-width="9" fill="none" stroke-linecap="round"/>
        <!-- neck -->
        <rect x="52" y="78" width="16" height="20" rx="7" fill="#F4C9A8"/>
        <!-- hair back + face -->
        <path d="M30 56 q0 -42 30 -42 q30 0 30 42 q0 22 -10 30 l-6 -34 -28 0 -6 34 q-10 -8 -10 -30Z" fill="#4A3340"/>
        <circle cx="60" cy="50" r="26" fill="#F6CEAD"/>
        <path d="M34 48 q-2 -34 26 -34 q28 0 26 34 q-12 -16 -26 -14 q-14 -2 -26 14Z" fill="#4A3340"/>
        <circle cx="60" cy="13" r="9" fill="#4A3340"/>
        <circle cx="48" cy="56" r="5" fill="#FF9FB8" opacity=".6"/>
        <circle cx="72" cy="56" r="5" fill="#FF9FB8" opacity=".6"/>
        <path d="M45 47 q4 -4 8 0" fill="none" stroke="#4A3340" stroke-width="2.4" stroke-linecap="round" id="mEyeL"/>
        <path d="M67 47 q4 -4 8 0" fill="none" stroke="#4A3340" stroke-width="2.4" stroke-linecap="round" id="mEyeR"/>
        <circle cx="49" cy="49" r="2.6" fill="#4A3340" id="mDotL" opacity="0"/>
        <circle cx="71" cy="49" r="2.6" fill="#4A3340" id="mDotR" opacity="0"/>
        <path id="mMouth" d="M53 61 q7 4 14 0" fill="none" stroke="#C26B82" stroke-width="2.4" stroke-linecap="round"/>
      </svg>

      <!-- Snowy, full-body running kitten (female) -->
      <div class="snowy" id="snowy" role="button" tabindex="0" aria-label="Call Snowy — she'll run to you">
        <svg class="snowy-inner" viewBox="0 0 140 120" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="80" cy="115" rx="38" ry="5" fill="rgba(138,90,110,.15)"/>
          <!-- tail -->
          <path class="tail" d="M30 78 q-22 -2 -20 -28 q-2 12 8 16 q-6 6 12 12Z" fill="#FFFFFF" stroke="#ECE2E8" stroke-width="2"/>
          <!-- back legs -->
          <path class="leg leg-a" d="M48 86 q-6 14 -2 24 l9 0 q-1 -12 3 -22Z" fill="#FFFFFF" stroke="#ECE2E8" stroke-width="2"/>
          <path class="leg leg-b" d="M64 88 q-4 14 0 24 l9 0 q-2 -12 1 -22Z" fill="#FFFFFF" stroke="#ECE2E8" stroke-width="2"/>
          <!-- body -->
          <ellipse cx="66" cy="74" rx="38" ry="27" fill="#FFFFFF" stroke="#ECE2E8" stroke-width="2"/>
          <!-- front legs reaching toward maa -->
          <path class="leg leg-b" d="M92 84 q8 14 14 22 l-8 4 q-9 -10 -14 -22Z" fill="#FFFFFF" stroke="#ECE2E8" stroke-width="2"/>
          <path class="leg leg-a" d="M80 88 q6 14 10 22 l-8 3 q-7 -11 -10 -22Z" fill="#FFFFFF" stroke="#ECE2E8" stroke-width="2"/>
          <!-- head -->
          <g>
            <path class="ear" d="M82 40 L80 16 L102 32 Z" fill="#FFFFFF" stroke="#ECE2E8" stroke-width="2"/>
            <path d="M84 38 L83 24 L96 33 Z" fill="#FFC9DC"/>
            <path class="ear" d="M120 40 L126 18 L104 30 Z" fill="#FFFFFF" stroke="#ECE2E8" stroke-width="2"/>
            <path d="M118 37 L121 25 L107 31 Z" fill="#FFC9DC"/>
            <circle cx="101" cy="50" r="27" fill="#FFFFFF" stroke="#ECE2E8" stroke-width="2"/>
            <circle cx="88" cy="56" r="5.5" fill="#FFB3CC" opacity=".6"/>
            <circle cx="114" cy="56" r="5.5" fill="#FFB3CC" opacity=".6"/>
            <!-- eyes looking toward maa (right) -->
            <g><circle cx="94" cy="47" r="6.5" fill="#5A4150"/><circle cx="96" cy="44.5" r="2" fill="#fff"/><ellipse class="eye-lid" cx="94" cy="47" rx="7.5" ry="7" fill="#FFFFFF"/></g>
            <g><circle cx="112" cy="47" r="6.5" fill="#5A4150"/><circle cx="114" cy="44.5" r="2" fill="#fff"/><ellipse class="eye-lid" cx="112" cy="47" rx="7.5" ry="7" fill="#FFFFFF"/></g>
            <path d="M99 57 h6 l-3 4 Z" fill="#FF8FAB"/>
            <path d="M102 61 q-5 5 -10 2 M102 61 q5 5 10 2" fill="none" stroke="#C9AEBC" stroke-width="2" stroke-linecap="round"/>
            <g stroke="#D9C9D3" stroke-width="1.5" stroke-linecap="round"><path d="M88 54 h-15 M89 60 h-14"/><path d="M116 54 h15 M115 60 h14"/></g>
          </g>
        </svg>
      </div>

      <!-- butterfly -->
      <svg class="fly" id="fly" style="left:50%; top:20%;" viewBox="0 0 40 32" role="button" tabindex="0" aria-label="A butterfly Snowy wants to chase" xmlns="http://www.w3.org/2000/svg">
        <path class="wing l" d="M20 16 C2 0 0 14 8 16 C0 18 2 32 20 16Z" fill="#FFB3D1" stroke="#FF8FAB" stroke-width="1"/>
        <path class="wing r" d="M20 16 C38 0 40 14 32 16 C40 18 38 32 20 16Z" fill="#E0BBE4" stroke="#C99BD0" stroke-width="1"/>
        <rect x="19" y="8" width="2" height="16" rx="1" fill="#6E4F5E"/>
      </svg>
    </div>

    <div class="meter" aria-hidden="true">
      <div class="meter-label">how she's feeling</div>
      <div class="pips" id="pips"></div>
    </div>

    <p class="hint" id="hint">tap Snowy — she'll run to you 🐾</p>
    <p class="credit">made for you 💗</p>
  </main>

  <div class="cele" id="cele">
    <svg viewBox="0 0 140 180" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- maa holding Snowy, smiling -->
      <ellipse cx="70" cy="174" rx="36" ry="6" fill="rgba(138,90,110,.16)"/>
      <path d="M50 96 q20 -8 40 0 l12 80 q-32 12 -64 0 Z" fill="#FFC2D6" stroke="#FFB0C9" stroke-width="2"/>
      <rect x="60" y="76" width="18" height="22" rx="8" fill="#F4C9A8"/>
      <path d="M36 54 q0 -44 33 -44 q33 0 33 44 q0 22 -10 30 l-7 -36 -32 0 -7 36 q-10 -8 -10 -30Z" fill="#4A3340"/>
      <circle cx="69" cy="48" r="28" fill="#F6CEAD"/>
      <path d="M41 46 q-2 -36 28 -36 q30 0 28 36 q-13 -17 -28 -15 q-15 -2 -28 15Z" fill="#4A3340"/>
      <circle cx="69" cy="10" r="9" fill="#4A3340"/>
      <circle cx="56" cy="54" r="5.5" fill="#FF9FB8" opacity=".7"/>
      <circle cx="82" cy="54" r="5.5" fill="#FF9FB8" opacity=".7"/>
      <path d="M52 44 q4 -4 8 0" fill="none" stroke="#4A3340" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M78 44 q4 -4 8 0" fill="none" stroke="#4A3340" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M59 58 q10 10 20 0" fill="none" stroke="#C26B82" stroke-width="2.8" stroke-linecap="round"/>
      <!-- arms cradling -->
      <path d="M52 110 q-14 18 6 30" stroke="#F4C9A8" stroke-width="10" fill="none" stroke-linecap="round"/>
      <path d="M88 110 q16 16 0 32" stroke="#F4C9A8" stroke-width="10" fill="none" stroke-linecap="round"/>
      <!-- Snowy curled in arms -->
      <g transform="translate(56,128)">
        <ellipse cx="14" cy="14" rx="20" ry="14" fill="#FFFFFF" stroke="#ECE2E8" stroke-width="2"/>
        <path d="M2 4 L0 -8 L12 0 Z" fill="#FFFFFF" stroke="#ECE2E8" stroke-width="2"/><path d="M4 2 L3 -5 L10 0Z" fill="#FFC9DC"/>
        <path d="M20 2 L24 -8 L12 -1 Z" fill="#FFFFFF" stroke="#ECE2E8" stroke-width="2"/><path d="M19 1 L21 -5 L13 -1Z" fill="#FFC9DC"/>
        <circle cx="13" cy="8" r="13" fill="#FFFFFF" stroke="#ECE2E8" stroke-width="2"/>
        <path d="M8 7 q3 3 -1 5 M8 7 q-3 3 1 6" stroke="#5A4150" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <path d="M18 7 q3 3 -1 5 M18 7 q-3 3 1 6" stroke="#5A4150" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <path d="M11 11 h4 l-2 2 Z" fill="#FF8FAB"/>
      </g>
    </svg>
    <h1 id="celeTitle">there's that smile 💗</h1>
    <p id="celeMsg"></p>
    <button class="btn" id="again">stay a little longer</button>
  </div>

<script>
  /* ───── Easy to edit ───── */
  const PET  = "maa";    // what Snowy calls her — change to her name if you like
  const NAME = "Snowy";  // the kitten's name shown in the UI

  // Snowy's lines, in order — she works through these as she runs closer.
  const LINES = [
    `why are you sad, ${PET}? 🥺`,
    `i warmed up the whole couch for you. come sit.`,
    `pet me again? a study said it helps. i think i made that up.`,
    `you don't need a reason to feel off, ${PET}. i'm here anyway.`,
    `bad moods are just little clouds. i'll wait with you till they pass.`,
    `there… i felt you relax a tiny bit. keep going.`,
    `you're my favourite human. by a very large amount.`
  ];

  // Playful lines when the butterfly is tapped.
  const PLAY_LINES = [
    `ooh— a butterfly! one sec, ${PET} 🦋`,
    `did you see me almost catch it?!`,
    `the garden's nicer when you're in it, ${PET}.`
  ];

  const FINAL_TITLE = `there's that smile 💗`;
  const FINAL_MSG   = `${NAME} ran the whole way across the garden just to reach you. She says she loves you, ${PET} — and so do I.`;
  const STEPS = 6; // taps to bring Snowy home
  /* ──────────────────────── */

  const snowy = document.getElementById('snowy');
  const fly   = document.getElementById('fly');
  const line  = document.getElementById('line');
  const hint  = document.getElementById('hint');
  const garden= document.getElementById('garden');
  const pipsBox = document.getElementById('pips');
  const cele  = document.getElementById('cele');
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const START = 14, END = 57;     // Snowy's left% from start to maa
  let steps = 0, idx = 0, done = false;

  for(let i=0;i<STEPS;i++){
    pipsBox.insertAdjacentHTML('beforeend',
      `<svg class="pip" viewBox="0 0 24 24"><path d="M12 21s-7.5-5-10-10C.5 8 2 4.5 5.5 4.5 8 4.5 10 6 12 8c2-2 4-3.5 6.5-3.5C22 4.5 23.5 8 22 11c-2.5 5-10 10-10 10z" fill="#FF5E8A"/></svg>`);
  }
  const pipEls = [...pipsBox.children];

  const amb = document.getElementById('ambient');
  const glyphs = ['🌸','🤍','💗','🦋','🌼'];
  for(let i=0;i<12;i++){
    const s = document.createElement('span');
    s.textContent = glyphs[i % glyphs.length];
    s.style.left = Math.random()*100 + 'vw';
    s.style.animationDuration = (9 + Math.random()*9) + 's';
    s.style.animationDelay = (-Math.random()*12) + 's';
    s.style.fontSize = (14 + Math.random()*16) + 'px';
    amb.appendChild(s);
  }

  function setLine(txt){
    line.style.opacity = 0; line.style.transform = 'translateY(6px)';
    setTimeout(()=>{ line.textContent = txt; line.style.opacity = 1; line.style.transform = 'translateY(0)'; }, 180);
  }
  function runAnim(){ snowy.classList.remove('run'); void snowy.offsetWidth; snowy.classList.add('run');
    setTimeout(()=> snowy.classList.remove('run'), 560); }
  function puff(){
    if(reduce) return;
    const r = garden.getBoundingClientRect();
    const sx = (parseFloat(snowy.style.left)||START)/100 * r.width;
    const sy = r.height*0.9;
    for(let i=0;i<4;i++){
      const p = document.createElement('div'); p.className='pop';
      p.textContent = ['🌿','✨','🌸','💗'][i%4];
      p.style.left = (sx + (Math.random()*30-15)) + 'px'; p.style.top = sy + 'px';
      p.style.setProperty('--dx',(Math.random()*60-30)+'px'); p.style.animationDelay=(i*40)+'ms';
      garden.appendChild(p); setTimeout(()=>p.remove(),1000);
    }
  }
  function fillMeter(){ const lit=Math.min(steps,STEPS); pipEls.forEach((el,i)=> el.classList.toggle('on', i<lit)); }

  function callSnowy(){
    if(done) return;
    steps++;
    const t = steps/STEPS;
    snowy.style.left = (START + (END-START)*t) + '%';
    snowy.style.setProperty('--s', (0.82 + 0.26*t).toFixed(3));
    runAnim(); puff();
    idx = Math.min(idx+1, LINES.length-1);
    setLine(LINES[idx]);
    fillMeter();
    if(steps===1) hint.textContent = `keep calling her — or watch the butterfly 🦋`;
    if(steps>=STEPS) finish();
  }

  function playFly(){
    if(done) return;
    runAnim();
    setLine(PLAY_LINES[Math.floor(Math.random()*PLAY_LINES.length)]);
  }

  function finish(){
    done = true; hint.textContent='';
    snowy.style.left = '66%';
    snowy.style.setProperty('--s','1.12');
    runAnim();
    document.getElementById('celeMsg').textContent = FINAL_MSG;
    document.getElementById('celeTitle').textContent = FINAL_TITLE;
    setTimeout(()=>{ cele.classList.add('show'); confetti(); }, 850);
  }

  function confetti(){
    if(reduce) return;
    const box=document.createElement('div'); box.className='confetti'; document.body.appendChild(box);
    const g=['💗','🤍','🌸','🌼','🦋','✨'];
    for(let i=0;i<60;i++){ const s=document.createElement('span'); s.textContent=g[i%g.length];
      s.style.left=Math.random()*100+'vw'; s.style.animationDuration=(2.4+Math.random()*2.6)+'s';
      s.style.animationDelay=(Math.random()*1.2)+'s'; s.style.fontSize=(16+Math.random()*18)+'px'; box.appendChild(s); }
    setTimeout(()=>box.remove(),6000);
  }

  snowy.addEventListener('click', callSnowy);
  snowy.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); callSnowy(); }});
  fly.addEventListener('click', e=>{ e.stopPropagation(); playFly(); });
  fly.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); playFly(); }});

  document.getElementById('again').addEventListener('click', ()=>{
    cele.classList.remove('show');
    steps=0; idx=0; done=false;
    snowy.style.left = START+'%'; snowy.style.setProperty('--s','0.82');
    fillMeter(); setLine(LINES[0]);
    hint.textContent = `tap ${NAME} — she'll run to you 🐾`;
  });
</script>
</body>
</html>
